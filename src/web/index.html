<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silicon Samples</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Password Gate -->
  <div id="auth-gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div class="card" style="max-width:360px;width:100%;text-align:center">
      <h1 style="margin-bottom:0.25rem"><span style="color:var(--primary)">Si</span>licon Samples</h1>
      <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1.5rem">Enter password to continue</p>
      <form id="auth-form">
        <div class="form-group">
          <input type="password" id="auth-password" placeholder="Password" autofocus style="text-align:center">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Enter</button>
        <p id="auth-error" style="color:var(--danger);font-size:0.8rem;margin-top:0.75rem;display:none">Incorrect password</p>
      </form>
    </div>
  </div>

  <div id="app-content" class="hidden">
  <header>
    <div class="container">
      <h1><span>Si</span>licon Samples</h1>
      <nav>
        <button class="active" data-page="dashboard">Dashboard</button>
        <button data-page="new-experiment">New Experiment</button>
        <button data-page="datasets">Datasets</button>
        <button data-page="methodology">Methodology</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Dashboard -->
    <section id="page-dashboard">
      <div class="grid grid-4">
        <div class="card stat-card">
          <div class="value" id="stat-experiments">-</div>
          <div class="label">Experiments</div>
        </div>
        <div class="card stat-card">
          <div class="value" id="stat-personas">-</div>
          <div class="label">Personas Generated</div>
        </div>
        <div class="card stat-card">
          <div class="value" id="stat-cost">-</div>
          <div class="label">Total Cost</div>
        </div>
        <div class="card stat-card">
          <div class="value" id="stat-datasets">-</div>
          <div class="label">Datasets Loaded</div>
        </div>
      </div>

      <div class="card">
        <h2>Experiments</h2>
        <div id="experiments-list"></div>
      </div>
    </section>

    <!-- New Experiment -->
    <section id="page-new-experiment" class="hidden">
      <div class="card">
        <h2>Create Experiment</h2>
        <form id="experiment-form">
          <div class="form-row">
            <div class="form-group">
              <label for="exp-name">Experiment Name</label>
              <input type="text" id="exp-name" placeholder="e.g., Consumer Study Q1 2026">
            </div>
            <div class="form-group">
              <label for="exp-dataset">Dataset</label>
              <select id="exp-dataset"></select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="exp-personas">Number of Personas</label>
              <input type="number" id="exp-personas" min="5" max="500" value="50">
            </div>
            <div class="form-group">
              <label for="exp-questions">Question Set</label>
              <select id="exp-questions"></select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="exp-temp">Temperature</label>
              <input type="number" id="exp-temp" min="0" max="2" step="0.1" value="1.0">
            </div>
            <div class="form-group">
              <label for="exp-budget">Budget Limit ($)</label>
              <input type="number" id="exp-budget" min="0.10" max="100" step="0.50" value="5.00">
            </div>
          </div>

          <div class="form-group">
            <label>Models</label>
            <div class="checkbox-group" id="exp-models"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="btn-run">Run Experiment</button>
        </form>
      </div>

      <!-- Progress -->
      <div class="card hidden" id="experiment-progress">
        <h2>Experiment Running</h2>
        <div class="grid grid-3">
          <div class="stat-card">
            <div class="value" id="prog-personas">0/0</div>
            <div class="label">Personas Interviewed</div>
          </div>
          <div class="stat-card">
            <div class="value" id="prog-cost">$0.00</div>
            <div class="label">Cost</div>
          </div>
          <div class="stat-card">
            <div class="value" id="prog-status">Starting...</div>
            <div class="label">Status</div>
          </div>
        </div>
        <div class="progress-bar"><div class="fill" id="prog-bar" style="width:0%"></div></div>
        <div class="status-log" id="prog-log"></div>
      </div>
    </section>

    <!-- Datasets -->
    <section id="page-datasets" class="hidden">
      <div class="card">
        <h2>Loaded Datasets</h2>
        <div id="datasets-list"></div>
      </div>
      <div id="dataset-detail"></div>
    </section>

    <!-- Results (dynamic) -->
    <section id="page-results" class="hidden">
      <div id="results-content"></div>
    </section>

    <!-- Experiment Deep-Dive -->
    <section id="page-experiment" class="hidden">
      <div id="experiment-content"></div>
    </section>

    <!-- Methodology Document -->
    <section id="page-methodology" class="hidden">
      <div id="methodology-content"></div>
    </section>
  </main>
  </div><!-- /app-content -->

  <script>
    // Password gate — checks against hash so plaintext isn't in source
    // SHA-256 of "siliconagents"
    const PASS_HASH = 'd11c025cb961bfb6c4a6a335dbfe08ef2fb13978aea23ecf7975a0a47a39830a';
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
    }
    // Check session
    if (sessionStorage.getItem('si_auth') === '1') {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('app-content').classList.remove('hidden');
    }
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('auth-password').value;
      if (await sha256(pw) === PASS_HASH) {
        sessionStorage.setItem('si_auth', '1');
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
      } else {
        document.getElementById('auth-error').style.display = 'block';
        document.getElementById('auth-password').value = '';
      }
    });
  </script>
  <script src="/experiment.js"></script>
  <script src="/methodology.js"></script>
  <script src="/app.js"></script>
</body>
</html>
